{% extends "emails/base.html" %}

{% block email_body %}

    La demande <strong>{{ request_reference }}</strong> a ete transformee en bon de commande
    <strong>{{ order_reference }}</strong> sur <strong>{{ tenant_name }}</strong>.
  </p>
  <p style="margin: 14px 0 0; font-size: 14px;">
    <a href="{{ procurement_url }}" target="_blank" rel="noopener noreferrer" style="color: #1e6ee8;">Ouvrir les bons de commande</a>
  </p>
{% endblock %}
