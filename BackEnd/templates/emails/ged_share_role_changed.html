{% extends "emails/base.html" %}

{% block email_body %}
  <p style="margin: 0 0 12px; font-size: 14px; color: #334155; line-height: 1.6;">
    <strong>{{ actor_name }}</strong> a modifie vos droits sur {{ item_label }}.
  </p>
  <div class="table-wrap">
    <table class="table" role="presentation">
      <tr><td>Avant</td><td>{{ old_role_label }}</td></tr>
      <tr><td>Maintenant</td><td>{{ new_role_label }}</td></tr>
      <tr><td>Espace</td><td>{{ tenant_name }}</td></tr>
    </table>
  </div>
  <p style="margin: 12px 0 0; font-size: 14px;">
    <a href="{{ ged_url }}" target="_blank" rel="noopener noreferrer">Ouvrir le Drive GED</a>
  </p>
{% endblock %}
