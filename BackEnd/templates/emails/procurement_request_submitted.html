{% extends "emails/base.html" %}

{% block email_body %}
  <p style="margin: 0 0 12px; font-size: 14px; color: #334155; line-height: 1.6;">
    <strong>{{ actor_name }}</strong> a soumis une demande d'achat sur <strong>{{ tenant_name }}</strong>.
  </p>
  <div class="table-wrap">
    <table class="table" role="presentation">
      <tr><td>Reference</td><td>{{ request_reference }}</td></tr>
      <tr><td>Titre</td><td>{{ request_title }}</td></tr>
    </table>
  </div>
  <p style="margin: 14px 0 0; font-size: 14px;">
    <a href="{{ procurement_url }}" target="_blank" rel="noopener noreferrer" style="color: #1e6ee8;">Ouvrir les demandes d'achat</a>
  </p>
{% endblock %}
