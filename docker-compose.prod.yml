services:
  db:
    image: postgres:17
    container_name: corpcore_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-corpcore}
      POSTGRES_USER: ${POSTGRES_USER:-corpcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-corpcore}
    volumes:
      - corpcore_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-corpcore} -d ${POSTGRES_DB:-corpcore}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - corpcore_net

  redis:
    image: redis:7-alpine
    container_name: corpcore_redis
    restart: unless-stopped
    volumes:
      - corpcore_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - corpcore_net

  backend:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile
    container_name: corpcore_backend
    restart: unless-stopped
    env_file:
      - ./BackEnd/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DJANGO_DEBUG: "0"
    volumes:
      - ./BackEnd:/app
      - corpcore_static_data:/app/staticfiles
      - corpcore_media_data:/app/media
    command: ["/app/entrypoint.sh"]
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - corpcore_net
      - proxy

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
      target: runner
    container_name: corpcore_frontend_prod
    restart: unless-stopped
    env_file:
      - ./FrontEnd/.env
    environment:
      NEXT_PUBLIC_API_BASE_URL: "/api"
      NODE_ENV: "production"
    depends_on:
      - backend
    expose:
      - "3000"
    networks:
      - corpcore_net
      - proxy

  nginx:
    image: nginx:1.27-alpine
    container_name: corpcore_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    expose:
      - "80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - corpcore_static_data:/app/staticfiles:ro
      - corpcore_media_data:/app/media:ro
    networks:
      - corpcore_net
      - proxy

  onlyoffice:
    image: onlyoffice/documentserver:8.1
    container_name: corpcore_onlyoffice
    restart: unless-stopped
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: onlyoffice-dev-secret
    expose:
      - "80"
    networks:
      - corpcore_net
      - proxy

  celery_worker:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile
    container_name: corpcore_celery_worker
    restart: unless-stopped
    env_file:
      - ./BackEnd/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./BackEnd:/app
    command: ["celery", "-A", "core", "worker", "-l", "info"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - corpcore_net

  celery_beat:
    build:
      context: ./BackEnd
      dockerfile: Dockerfile
    container_name: corpcore_celery_beat
    restart: unless-stopped
    env_file:
      - ./BackEnd/.env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./BackEnd:/app
    command: ["celery", "-A", "core", "beat", "-l", "info"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - corpcore_net

volumes:
  corpcore_postgres_data:
  corpcore_redis_data:
  corpcore_static_data:
  corpcore_media_data:

networks:
  corpcore_net:
    driver: bridge
  proxy:
    external: true
    name: ${PROXY_NETWORK:-proxy}
